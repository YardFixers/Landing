<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
YardFixers Owner Dashboard
</title>

<link rel="stylesheet"
href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap"

</head>

<body>

<section class="dashboard">

<!-- STATS -->

<div class="stats-grid">

0

</p>

</div>

<div class="stat-card">

<h2 id="requestCount">
0
</h2>

<p>
Requests

</div>

<div class="stat-card">

<h2 id="feedbackCount">
0
</h2>

<p>
Feedback
</p>

</div>

0
</h2>

Accounts
</p>

<h2>
Recent Requests
</h2>

<div id="requestsContainer">

</div>

</div>

<div class="dashboard-box">

<h2>
Recent Feedback
</h2>

<div id="feedbackContainer">

</div>
