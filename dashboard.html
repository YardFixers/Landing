<!-- FILE NAME: dashboard.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
YardFixers Owner Dashboard
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body class="dashboard-body">

<!-- LOGIN SCREEN -->

<div
class="owner-login"
id="loginScreen">

<div class="owner-box">

<h1>
Owner Login
</h1>

<p>
Authorized Access Only
</p>

<input
type="text"
id="ownerUser"
placeholder="Username">

<input
type="password"
id="ownerPass"
placeholder="Password">

<button
onclick="loginOwner()">

Login

</button>

<p
id="loginError"
class="login-error">

</p>

<a
href="index.html"
class="back-site">

← Back To Site

</a>

</div>

</div>

<!-- DASHBOARD -->

<div
class="dashboard-container"
id="dashboardContainer">

<div class="dashboard-top">

<h1>
YardFixers Dashboard
</h1>

<button
class="logout-btn"
onclick="logoutOwner()">

Logout

</button>

</div>

<div class="stats-grid">

<div class="stat-card">

<h2 id="visitorCount">
0
</h2>

<p>
Visitors
</p>

</div>

<div class="stat-card">

<h2 id="requestCount">
0
</h2>

<p>
Requests
</p>

</div>

<div class="stat-card">

<h2 id="feedbackCount">
0
</h2>

<p>
Feedback
</p>

</div>

<div class="stat-card">

<h2 id="userCount">
0
</h2>

<p>
Users
</p>

</div>

</div>

<div class="dashboard-section">

<h2>
Recent Requests
</h2>

<div
id="requestsContainer">

</div>

</div>

<div class="dashboard-section">

<h2>
Visitors
</h2>

<div
id="visitorContainer">

</div>

</div>

<button
class="return-site"
onclick="backToSite()">

Back To Main Site

</button>

</div>

<script src="dashboard.js"></script>

</body>

</html>
