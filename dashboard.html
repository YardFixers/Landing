<!-- FILE NAME: dashboard.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
YardFixers Owner Dashboard
</title>

<link
rel="stylesheet"
href="dashboard.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap"
rel="stylesheet">

</head>

<body>

<!-- LOGIN SCREEN -->

<div
class="login-screen"
id="loginScreen">

<div class="login-box">

<h1>
YardFixers
</h1>

<p>
Owner Dashboard Access
</p>

<input
type="text"
id="ownerUser"
placeholder="Username">

<input
type="password"
id="ownerPass"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<div
class="login-error"
id="loginError">

Wrong username or password.

</div>

<a
href="index.html"
class="back-site">

Back To Site

</a>

</div>

</div>

<!-- DASHBOARD -->

<div
class="dashboard hidden"
id="dashboard">

<nav class="dash-nav">

<div class="dash-logo">
YardFixers Owner
</div>

<div class="dash-buttons">

<button id="logoutBtn">
Logout
</button>

<a
href="index.html"
id="backBtn">

Back To Site

</a>

</div>

</nav>

<!-- STATS -->

<section class="stats-grid">

<div class="stat-card">

<h2 id="visitorCount">
0
</h2>

<p>
Visitors
</p>

</div>

<div class="stat-card">

<h2 id="requestCount">
0
</h2>

<p>
Requests
</p>

</div>

<div class="stat-card">

<h2 id="feedbackCount">
0
</h2>

<p>
Feedback
</p>

</div>

<div class="stat-card">

<h2 id="accountCount">
0
</h2>

<p>
Accounts
</p>

</div>

</section>

<!-- RECENT REQUESTS -->

<section class="panel">

<div class="panel-top">

<h2>
Recent Requests
</h2>

</div>

<div
class="panel-list"
id="requestList">

</div>

</section>

<!-- FEEDBACK -->

<section class="panel">

<div class="panel-top">

<h2>
Recent Feedback
</h2>

</div>

<div
class="panel-list"
id="feedbackList">

</div>

</section>

<!-- VISITORS -->

<section class="panel">

<div class="panel-top">

<h2>
Recent Visitors
</h2>

</div>

<div
class="panel-list"
id="visitorList">

</div>

</section>

</div>

<script src="dashboard.js"></script>

</body>

</html>
