<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
YardFixers Owner Dashboard
</title>

<link
rel="stylesheet"
href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap"
rel="stylesheet">

</head>

<body>

<section class="dashboard-page">

<div class="dashboard-top">

<div>

<h1>
Owner Dashboard
</h1>

<p class="dashboard-sub">

Private YardFixers analytics panel

</p>

</div>

<button
id="logoutBtn"
class="submit-btn dashboard-logout">

Back To Site

</button>

</div>

<!-- STATS -->

<div class="dashboard-grid">

<div class="dashboard-card">

<h2 id="visitCount">
0
</h2>

<p>
Site Visitors
</p>

</div>

<div class="dashboard-card">

<h2 id="requestCount">
0
</h2>

<p>
Requests Sent
</p>

</div>

<div class="dashboard-card">

<h2 id="feedbackCount">
0
</h2>

<p>
Feedback Entries
</p>

</div>

<div class="dashboard-card">

<h2 id="revenueCount">
$0
</h2>

<p>
Estimated Revenue
</p>

</div>

</div>

<!-- REQUESTS -->

<div class="dashboard-panel">

<h2>
Recent Requests
</h2>

<div id="requestContainer">

</div>

</div>

<!-- FEEDBACK -->

<div class="dashboard-panel">

<h2>
Recent Feedback
</h2>

<div id="feedbackContainer">

</div>

</div>

</section>

<script src="dashboard.js"></script>

</body>

</html>
